<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="東京主要6路線をスキーマティックなSVG路線図として描画し、乗換探索ができるビューア"
    />
    <title>rosen - 鉄道路線図ビューア</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="10" fill="none" stroke="#80c241" stroke-width="3" />
          <path
            d="M4 27 L28 5"
            fill="none"
            stroke="#f62e36"
            stroke-width="3"
            stroke-linecap="round"
          />
          <circle
            cx="16"
            cy="16"
            r="3.2"
            fill="var(--surface, #fff)"
            stroke="currentColor"
            stroke-width="1.6"
          />
        </svg>
        <h1>rosen</h1>
        <p class="tagline">東京主要6路線の路線図と乗換探索</p>
      </div>
      <button
        id="theme-toggle"
        class="icon-button"
        type="button"
        aria-label="配色テーマを切り替える"
      >
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8" />
          <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path
              d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5 5l1.7 1.7M17.3 17.3 19 19M19 5l-1.7 1.7M6.7 17.3 5 19"
            />
          </g>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </header>

    <main class="app-main">
      <aside class="panel">
        <form id="route-form" autocomplete="off">
          <div class="field">
            <label for="from-input">出発</label>
            <input
              id="from-input"
              name="from"
              list="station-list"
              placeholder="例: 渋谷"
              required
            />
          </div>
          <button
            type="button"
            id="swap-button"
            class="icon-button"
            aria-label="出発と到着を入れ替える"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <g
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M8 4v13M8 4 5 7M8 4l3 3" />
                <path d="M16 20V7M16 20l-3-3M16 20l3-3" />
              </g>
            </svg>
          </button>
          <div class="field">
            <label for="to-input">到着</label>
            <input id="to-input" name="to" list="station-list" placeholder="例: 浅草" required />
          </div>
          <button type="submit" class="primary-button">経路を探索</button>
        </form>
        <datalist id="station-list"></datalist>
        <p class="hint">地図上の駅を続けて2つ選んでも探索できます。</p>
        <section id="result" class="result" aria-live="polite"></section>
        <section class="legend" aria-label="路線凡例">
          <h2>路線</h2>
          <ul id="legend-list"></ul>
        </section>
      </aside>

      <section class="map-wrap" aria-label="路線図">
        <div id="map" class="map"></div>
        <div class="map-controls" role="group" aria-label="地図操作">
          <button id="zoom-in" class="icon-button" type="button" aria-label="拡大">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5v14M5 12h14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button id="zoom-out" class="icon-button" type="button" aria-label="縮小">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M5 12h14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button id="zoom-reset" class="icon-button" type="button" aria-label="全体表示に戻す">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <g
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
              </g>
            </svg>
          </button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>
        収録は山手線・中央線快速・銀座線・丸ノ内線・日比谷線・東西線の101駅。所要時分は日中の
        概算で、運行情報・運賃には対応していません。
      </p>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
